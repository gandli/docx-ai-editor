<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOCX AI Editor</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }
    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
    }
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .document-panel {
      flex: 1;
      border-right: 1px solid #e0e0e0;
      overflow: auto;
    }
    .chat-panel {
      width: 400px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #e0e0e0;
    }
    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #fafafa;
    }
    .message {
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 4px;
    }
    .message.user {
      background: #e3f2fd;
    }
    .message.ai {
      background: #f1f8e9;
    }
    .chat-input {
      padding: 16px;
      border-top: 1px solid #e0e0e0;
      background: white;
    }
    .chat-input input {
      width: calc(100% - 80px);
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-right: 8px;
    }
    .chat-input button {
      padding: 8px 16px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .chat-input button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
